name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Offline audit (no external URLs in dist/)
        run: |
          if grep -rnE 'https?://(?!localhost|127\.0\.0\.1|www\.w3\.org)' web/dist/ > /tmp/urls.txt; then
            echo "❌ External URLs found in web/dist/:"
            cat /tmp/urls.txt
            exit 1
          else
            echo "✅ no external URLs in web/dist/"
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        run: go build -o /tmp/erdlens ./cmd/erdlens

      - name: Smoke test binary
        run: |
          /tmp/erdlens version
          /tmp/erdlens --help
          /tmp/erdlens generate --help
          /tmp/erdlens view --help

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          args: --timeout=5m
